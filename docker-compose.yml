version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anthropic-blog-backend
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./anthropic_blog.db
      FEISHU_WEBHOOK: ${FEISHU_WEBHOOK:-}
    networks:
      - blog-network
    volumes:
      - /Users/huangyifei/.openclaw:/root/.openclaw:ro
      - backend_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anthropic-blog-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - blog-network
    ports:
      - "3000:3000"
    restart: unless-stopped

networks:
  blog-network:
    driver: bridge

volumes:
  backend_data:
