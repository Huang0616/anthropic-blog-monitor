version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: anthropic-blog-db
    environment:
      POSTGRES_USER: anthropic_blog
      POSTGRES_PASSWORD: anthropic_blog_pass
      POSTGRES_DB: anthropic_blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anthropic_blog"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anthropic-blog-backend
    environment:
      POSTGRES_USER: anthropic_blog
      POSTGRES_PASSWORD: anthropic_blog_pass
      POSTGRES_DB: anthropic_blog
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      FEISHU_WEBHOOK: ${FEISHU_WEBHOOK:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blog-network
    volumes:
      - /Users/huangyifei/.openclaw:/root/.openclaw:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anthropic-blog-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://host.docker.internal:8000
    depends_on:
      - backend
    networks:
      - blog-network
    ports:
      - "3002:3000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  blog-network:
    driver: bridge

volumes:
  postgres_data:
